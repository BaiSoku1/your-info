<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBX Loader | Premium Obfuscator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --card-bg: rgba(20, 20, 30, 0.6);
            --accent: #3b82f6; /* Modern Blue */
            --accent-glow: rgba(59, 130, 246, 0.4);
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 850px;
            animation: fadeIn 0.8s ease-out;
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            color: var(--text-dim);
            margin-top: 8px;
            font-size: 0.95rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Glass Card */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-group { margin-bottom: 24px; }
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Elements Styling */
        select, textarea {
            width: 100%;
            background: rgba(15, 15, 25, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            padding: 15px;
            outline: none;
            transition: all 0.3s ease;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%233b82f6%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem top 50%;
            background-size: 0.65rem auto;
        }
        select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }
        
        select option {
            background-color: #0a0a0f;
            color: #fff;
            padding: 12px;
        }

        textarea {
            height: 250px;
            resize: none;
            font-size: 13px;
            line-height: 1.6;
        }

        /* Button */
        .btn-obfuscate {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-obfuscate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px var(--accent-glow);
            filter: brightness(1.1);
        }
        .btn-obfuscate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Result Area */
        #resultContainer {
            margin-top: 24px;
            display: none;
            animation: slideUp 0.5s ease-out;
        }
        .result-box {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            padding: 20px;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .result-header span {
            color: var(--success);
            font-weight: 600;
            font-size: 0.85rem;
        }
        .loader-text {
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            word-break: break-all;
            color: var(--success);
        }
        .copy-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Loader Animation */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>RBX.Loader</h1>
        <p>Advanced Prometheus Obfuscator</p>
    </div>

    <div class="glass-card">
        <div class="input-group">
            <label>1. Select Protection Level</label>
            <select id="preset">
                <option value="Weak">Weak — Fast & Simple</option>
                <option value="Medium" selected>Medium — Balanced (Recommended)</option>
                <option value="Strong">Strong — Heavy Protection</option>
            </select>
        </div>

        <div class="input-group">
            <label>2. Paste Your Lua Script</label>
            <textarea id="scriptInput" placeholder="-- Enter your source code here..."></textarea>
        </div>

        <button id="obfBtn" class="btn-obfuscate" onclick="handleObfuscate()">
            <div class="spinner" id="spinner"></div>
            <span id="btnText">Protect Script</span>
        </button>

        <div id="resultContainer">
            <div class="result-box">
                <div class="result-header">
                    <span>✓ Obfuscation Successful</span>
                    <button class="copy-btn" onclick="copyToClipboard()">Copy Loader</button>
                </div>
                <div class="loader-text" id="loaderOutput"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentLoader = "";

    async function handleObfuscate() {
        const script = document.getElementById('scriptInput').value.trim();
        const preset = document.getElementById('preset').value;
        const btn = document.getElementById('obfBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const resultCont = document.getElementById('resultContainer');

        if (!script) return alert("Please enter a script!");

        // UI Loading State
        btn.disabled = true;
        spinner.style.display = "block";
        btnText.innerText = "Processing...";
        resultCont.style.display = "none";

        try {
            const response = await fetch('/api/obfuscate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ script, preset })
            });

            const data = await response.json();

            if (data.success) {
                currentLoader = data.loader;
                document.getElementById('loaderOutput').innerText = data.loader;
                resultCont.style.display = "block";
            } else {
                alert("Error: " + data.error);
            }
        } catch (err) {
            alert("Connection error to server.");
        } finally {
            btn.disabled = false;
            spinner.style.display = "none";
            btnText.innerText = "Protect Script";
        }
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(currentLoader).then(() => {
            const copyBtn = document.querySelector('.copy-btn');
            copyBtn.innerText = "Copied!";
            copyBtn.style.background = "#059669";
            setTimeout(() => {
                copyBtn.innerText = "Copy Loader";
                copyBtn.style.background = "#10b981";
            }, 2000);
        });
    }
</script>

</body>
</html>
