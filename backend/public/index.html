<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Codespace Lua Obfuscator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d0f14;
      color: #f1f5f9;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(59,130,246,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 680px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(59,130,246,.15);
      border: 1px solid rgba(59,130,246,.3);
      color: #93c5fd;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 16px;
    }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3b82f6;
      box-shadow: 0 0 6px #3b82f6;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.4; transform:scale(.7); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.02em;
      color: #f1f5f9;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #64748b;
      font-size: 14px;
      font-weight: 300;
    }

    /* Card */
    .card {
      background: #141720;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,.4);
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #475569;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 200px;
      background: #0d0f14;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      color: #4ade80;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 14px 16px;
      resize: vertical;
      transition: border-color .2s;
      outline: none;
    }

    textarea:focus {
      border-color: rgba(59,130,246,.4);
      box-shadow: 0 0 0 3px rgba(59,130,246,.08);
    }

    textarea::placeholder { color: #334155; }

    .btn-obfuscate {
      width: 100%;
      margin-top: 14px;
      padding: 13px 24px;
      background: #3b82f6;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all .18s ease;
      box-shadow: 0 2px 16px rgba(59,130,246,.3);
    }

    .btn-obfuscate:hover { background: #2563eb; transform: translateY(-1px); }
    .btn-obfuscate:disabled { background: #1e3a5f; color: #475569; cursor: not-allowed; transform: none; }

    /* Spinner */
    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result */
    .result {
      margin-top: 16px;
      background: #0d0f14;
      border: 1px solid rgba(59,130,246,.2);
      border-radius: 10px;
      padding: 16px;
      display: none;
      animation: fadeUp .3s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .result-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #3b82f6;
      margin-bottom: 10px;
    }

    .result-code {
      background: #141720;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #94a3b8;
      word-break: break-all;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .btn-copy {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(59,130,246,.12);
      border: 1px solid rgba(59,130,246,.25);
      color: #93c5fd;
      font-size: 13px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s ease;
    }

    .btn-copy:hover { background: rgba(59,130,246,.2); }
    .btn-copy.copied { background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.25); color: #86efac; }

    /* Error */
    .error-box {
      margin-top: 14px;
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 10px;
      padding: 14px 16px;
      color: #f87171;
      font-size: 13px;
      display: none;
      animation: fadeUp .3s ease both;
    }

    /* Footer */
    .footer {
      margin-top: 24px;
      text-align: center;
      color: #334155;
      font-size: 12px;
    }

    .footer a { color: #3b82f6; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="badge"><span class="badge-dot"></span>Lua Obfuscator</div>
      <h1>Remote Loader Obfuscator</h1>
      <p class="subtitle">Obfuscate script Lua kamu dan dapatkan loadstring siap pakai</p>
    </div>

    <div class="card">
      <label>Script Lua</label>
      <textarea id="scriptInput" placeholder='-- Tempel script Lua kamu di sini&#10;print("Hello dari Codespaces!")'></textarea>

      <button class="btn-obfuscate" id="obfBtn" onclick="obfuscate()">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Obfuscate &amp; Get Loader</span>
      </button>

      <div class="error-box" id="errorBox"></div>

      <div class="result" id="resultBox">
        <div class="result-label">✦ Loadstring Kamu</div>
        <div class="result-code" id="loaderCode"></div>
        <button class="btn-copy" id="copyBtn" onclick="copyLoader()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy Loadstring
        </button>
      </div>
    </div>

    <div class="footer">
      Protected by <a href="https://t.me/deuznih" target="_blank">@deuznih</a>
    </div>

  </div>

  <script>
    async function obfuscate() {
      const script = document.getElementById('scriptInput').value.trim();
      const btn    = document.getElementById('obfBtn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');
      const resultBox = document.getElementById('resultBox');
      const errorBox  = document.getElementById('errorBox');

      if (!script) {
        showError('Script tidak boleh kosong!');
        return;
      }

      // Loading state
      btn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = 'Memproses...';
      resultBox.style.display = 'none';
      errorBox.style.display  = 'none';

      try {
        const response = await fetch('https://remote-loader-project-production.up.railway.app/api/obfuscate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ script })
        });

        const data = await response.json();

        if (data.success) {
          document.getElementById('loaderCode').textContent = data.loader;
          resultBox.style.display = 'block';
          // Reset copy button
          const copyBtn = document.getElementById('copyBtn');
          copyBtn.classList.remove('copied');
          copyBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Loadstring`;
        } else {
          showError('Error: ' + data.error);
        }
      } catch (err) {
        showError('Gagal terhubung ke server. Coba lagi.');
      }

      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = 'Obfuscate & Get Loader';
    }

    function copyLoader() {
      const text = document.getElementById('loaderCode').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Loadstring`;
        }, 2000);
      });
    }

    function showError(msg) {
      const errorBox = document.getElementById('errorBox');
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }
  </script>
</body>
</html>
